<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicode Homoglyph Swapper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Fira+Code&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .mono {
            font-family: 'Fira Code', monospace;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        /* Range Slider Styling */
        input[type=range] {
            height: 6px;
            -webkit-appearance: none;
            width: 100%;
            background: #dfe6e9;
            border-radius: 5px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            background: #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            transition: background .15s ease-in-out;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">Homoglyph Swapper</h1>
            <p class="text-slate-600">Inject invisible differences into your text.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <!-- Probability Slider -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="font-semibold text-slate-700">Swap Intensity</h2>
                        <span id="percent-label" class="text-sm font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">24%</span>
                    </div>
                    <!-- Default set to 24 -->
                    <input type="range" id="probability" min="0" max="100" value="24" class="mb-2">
                    <p class="text-[11px] text-slate-400 italic">Determines the chance of each letter being replaced.</p>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-slate-700">Allowed Letters</h2>
                        <div class="space-x-2">
                            <button onclick="toggleAll(true)" class="text-xs text-blue-600 hover:underline">All</button>
                            <button onclick="toggleAll(false)" class="text-xs text-slate-500 hover:underline">None</button>
                        </div>
                    </div>
                    <div id="settings-grid" class="grid grid-cols-3 gap-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <label for="input-text" class="block text-sm font-medium text-slate-700 mb-2">Source Text</label>
                    <textarea 
                        id="input-text" 
                        class="w-full h-32 p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none"
                        placeholder="Type something..."
                    ></textarea>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 relative">
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-sm font-medium text-slate-700">Swapped Result</label>
                        <button onclick="copyToClipboard()" class="flex items-center gap-2 px-3 py-1.5 bg-slate-800 text-white text-xs font-medium rounded-lg hover:bg-slate-700 transition-colors">
                            Copy Result
                        </button>
                    </div>
                    <div id="output-text" class="mono w-full min-h-[128px] p-4 bg-slate-50 rounded-xl border border-slate-200 break-all whitespace-pre-wrap text-slate-800"></div>
                    
                    <div class="mt-3 flex justify-between text-[10px] uppercase tracking-wider font-bold text-slate-400">
                        <span>Replacements: <span id="stat-count" class="text-blue-500">0</span></span>
                        <button onclick="processText()" class="text-blue-500 hover:text-blue-700">🎲 Re-roll Randomness</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-slate-900 text-white rounded-full shadow-lg transition-all opacity-0 pointer-events-none translate-y-4">
        Copied!
    </div>

    <script>
        const homoglyphMap = {
            'a': 'а', 'A': 'А', 'b': 'Ь', 'B': 'В', 'c': 'с', 'C': 'С',
            'e': 'е', 'E': 'Е', 'h': 'һ', 'H': 'Н', 'i': 'і', 'I': 'І',
            'j': 'ј', 'J': 'Ј', 'k': 'κ', 'K': 'Κ', 'o': 'о', 'O': 'О',
            'p': 'р', 'P': 'Р', 's': 'ѕ', 'S': 'Ѕ', 'x': 'х', 'X': 'Х',
            'y': 'у', 'Y': 'Ү'
        };

        const settingsGrid = document.getElementById('settings-grid');
        const inputEl = document.getElementById('input-text');
        const outputEl = document.getElementById('output-text');
        const probSlider = document.getElementById('probability');
        const probLabel = document.getElementById('percent-label');
        const statCount = document.getElementById('stat-count');

        function initSettings() {
            Object.keys(homoglyphMap).sort().forEach(char => {
                const label = document.createElement('label');
                label.className = "flex items-center gap-2 p-2 rounded-lg hover:bg-slate-50 cursor-pointer border border-transparent";
                label.innerHTML = `
                    <input type="checkbox" checked data-char="${char}" onchange="processText()" class="w-4 h-4 rounded text-blue-600">
                    <span class="text-sm font-medium text-slate-600">${char}</span>
                `;
                settingsGrid.appendChild(label);
            });
        }

        function processText() {
            const text = inputEl.value;
            const probability = probSlider.value / 100;
            probLabel.textContent = probSlider.value + "%";
            
            const enabledChars = new Set();
            settingsGrid.querySelectorAll('input:checked').forEach(cb => enabledChars.add(cb.dataset.char));

            let result = "";
            let count = 0;

            for (const char of text) {
                // If it's a swappable character, enabled in settings, AND passes the random roll
                if (enabledChars.has(char) && Math.random() < probability) {
                    result += homoglyphMap[char];
                    count++;
                } else {
                    result += char;
                }
            }

            outputEl.textContent = result;
            statCount.textContent = count;
        }

        function toggleAll(state) {
            settingsGrid.querySelectorAll('input').forEach(cb => cb.checked = state);
            processText();
        }

        function copyToClipboard() {
            const textArea = document.createElement("textarea");
            textArea.value = outputEl.textContent;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            
            const toast = document.getElementById('toast');
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 2000);
        }

        probSlider.oninput = processText;
        inputEl.oninput = processText;
        window.onload = () => { 
            initSettings(); 
            inputEl.value = "Hello World"; 
            processText(); 
        };
    </script>
</body>
</html>
